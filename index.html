<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleatoric Space V8 - SONG, YOUNG-MIN Guitar Lab</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        #header {
            position: absolute; top: 0; width: 100%; height: 75px;
            background: #000; display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            border-bottom: 1px solid #222;
        }
        #watermark { font-size: 10px; letter-spacing: 2.5px; color: #444; margin-bottom: 9px; font-weight: bold; text-shadow: 0 0 2px #333; }
        .controls { display: flex; gap: 10px; }
        .btn {
            background: #001f3f; border: 1px solid #003366; color: #fff;
            padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:active { background: #004080; }
        .speed-val { color: #fff; font-size: 11px; font-weight: bold; display: flex; align-items: center; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="header">
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>
    <div class="controls">
        <div class="btn" onclick="spawnMeteor('Cu')">Cu</div>
        <div class="btn" onclick="spawnMeteor('Fe')">Fe</div>
        <div class="btn" onclick="spawnMeteor('Ag')">Ag</div>
        <div style="width:20px"></div>
        <div class="btn" onclick="changeSpeed(-1)">-</div>
        <span class="speed-val">TEMPO</span>
        <div class="btn" onclick="changeSpeed(1)">+</div>
        <div style="width:10px"></div>
        <div class="btn" onclick="togglePause()" id="pauseBtn">⏸</div>
    </div>
</div>

<canvas id="space"></canvas>

<script>
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];
    
    let width, height;
    let isPaused = false;
    let tempoScale = 1.0; // 속도 배율
    const blockSize = 30; 
    let meteors = [];
    let hitBlocks = { t: -1, b: -1, l: -1, r: -1, color: '#fff' };

    // 원소별 속성 (색상, 질량)
    const elements = {
        'Cu': { color: '#ff7f24', mass: 1.5 }, // 구리 (주황색, 무거움)
        'Fe': { color: '#8b8b83', mass: 1.2 }, // 철 (회색, 보통)
        'Ag': { color: '#e0e0e0', mass: 0.8 }  // 은 (흰색, 가벼움)
    };

    // --- Audio Setup & Reverb ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const mainGain = audioCtx.createGain();
    mainGain.gain.value = 0.5;
    mainGain.connect(audioCtx.destination);

    function playNote(index) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freqs[index % 12], audioCtx.currentTime);
        g.gain.setValueAtTime(0.4, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
        osc.connect(g);
        g.connect(mainGain);
        osc.start(); osc.stop(audioCtx.currentTime + 1.5);
    }

    // --- Rounded Rectangle Drawing ---
    function fillRoundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        ctx.fill();
    }

    // --- Multi-Meter System with Elemental Physics ---
    class Meteor {
        constructor(x, y, element) {
            this.x = x; this.y = y;
            this.vx = 0; this.vy = 0;
            this.radius = 12;
            this.element = element;
            this.color = elements[element].color;
            this.mass = elements[element].mass;
            this.angle = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            this.isDragging = false;
            // 랜덤한 울퉁불퉁한 다각형 모양
            this.vertices = [];
            for(let i=0; i<10; i++) {
                const a = (i/10)*Math.PI*2;
                const r = this.radius * (0.8 + Math.random()*0.4);
                this.vertices.push({x: Math.cos(a)*r, y: Math.sin(a)*r});
            }
        }
        update() {
            if (isPaused || this.isDragging) return;
            // TEMPO 스케일 적용
            this.x += this.vx * tempoScale;
            this.y += this.vy * tempoScale;
            this.angle += this.rotationSpeed * tempoScale;

            const limits = { t: 75+blockSize+this.radius, b: height-blockSize-this.radius, l: blockSize+this.radius, r: width-blockSize-this.radius };

            // 벽 충돌 (각도 및 회전 반영)
            if (this.x < limits.l || this.x > limits.r) {
                this.vx *= -1;
                this.rotationSpeed += (Math.random()-0.5)*0.02; // 충돌 시 회전 변화
                const idx = Math.floor(((this.y - 75) / (height - 75)) * 12);
                hitBlocks.color = this.color;
                if (this.x < limits.l) { this.x = limits.l; hitBlocks.l = idx; } else { this.x = limits.r; hitBlocks.r = idx; }
                playNote(idx);
            }
            if (this.y < limits.t || this.y > limits.b) {
                this.vy *= -1;
                this.rotationSpeed += (Math.random()-0.5)*0.02;
                const idx = Math.floor((this.x / width) * 12);
                hitBlocks.color = this.color;
                if (this.y < limits.t) { this.y = limits.t; hitBlocks.t = idx; } else { this.y = limits.b; hitBlocks.b = idx; }
                playNote(idx);
            }
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
            this.vertices.forEach(v => ctx.lineTo(v.x, v.y));
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }
    }

    // 운석 간 탄성 충돌 물리 엔진 (질량 반영)
    function resolveMeteorCollision() {
        for (let i = 0; i < meteors.length; i++) {
            for (let j = i + 1; j < meteors.length; j++) {
                let m1 = meteors[i];
                let m2 = meteors[j];
                let dx = m2.x - m1.x;
                let dy = m2.y - m1.y;
                let distance = Math.hypot(dx, dy);
                let minDistance = m1.radius + m2.radius + 5;

                if (distance < minDistance) {
                    // 위치 보정 (겹침 방지)
                    let overlap = minDistance - distance;
                    let nx = dx / distance;
                    let ny = dy / distance;
                    m1.x -= nx * overlap / 2;
                    m1.y -= ny * overlap / 2;
                    m2.x += nx * overlap / 2;
                    m2.y += ny * overlap / 2;

                    // 질량을 반영한 탄성 충돌 속도 교환
                    let v1n = m1.vx * nx + m1.vy * ny;
                    let v2n = m2.vx * nx + m2.vy * ny;
                    
                    let newV1n = (v1n * (m1.mass - m2.mass) + 2 * m2.mass * v2n) / (m1.mass + m2.mass);
                    let newV2n = (v2n * (m2.mass - m1.mass) + 2 * m1.mass * v1n) / (m1.mass + m2.mass);
                    
                    m1.vx += (newV1n - v1n) * nx;
                    m1.vy += (newV1n - v1n) * ny;
                    m2.vx += (newV2n - v2n) * nx;
                    m2.vy += (newV2n - v2n) * ny;
                }
            }
        }
    }

    function spawnMeteor(element) {
        // 중앙에 생성, 약간의 랜덤 오프셋
        const offX = (Math.random()-0.5)*50;
        const offY = (Math.random()-0.5)*50;
        meteors.push(new Meteor(width/2 + offX, (height+75)/2 + offY, element));
    }

    function drawGrid() {
        const w = width / 12;
        const h = (height - 75) / 12;
        ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

        for(let i=0; i<12; i++) {
            // 상단
            ctx.fillStyle = (hitBlocks.t === i) ? hitBlocks.color : 'rgba(255,255,255,0.05)';
            fillRoundedRect(w*i+2, 76, w-4, blockSize-4, 8);
            // 하단
            ctx.fillStyle = (hitBlocks.b === i) ? hitBlocks.color : 'rgba(255,255,255,0.05)';
            fillRoundedRect(w*i+2, height-blockSize+2, w-4, blockSize-4, 8);
            // 좌측
            ctx.fillStyle = (hitBlocks.l === i) ? hitBlocks.color : 'rgba(255,255,255,0.05)';
            fillRoundedRect(2, 75+h*i+2, blockSize-4, h-4, 8);
            // 우측
            ctx.fillStyle = (hitBlocks.r === i) ? hitBlocks.color : 'rgba(255,255,255,0.05)';
            fillRoundedRect(width-blockSize+2, 75+h*i+2, blockSize-4, h-4, 8);

            ctx.fillStyle = '#222';
            ctx.fillText(notes[i], w*i+w/2, 75+blockSize/2);
            ctx.fillText(notes[i], w*i+w/2, height-blockSize/2);
            ctx.fillText(notes[i], blockSize/2, 75+h*i+h/2);
            ctx.fillText(notes[i], width-blockSize/2, 75+h*i+h/2);
        }
        for(let k in hitBlocks) if(k !== 'color') hitBlocks[k] = -1;
    }

    let activeMeteor = null;
    let startT = {x:0, y:0};

    canvas.addEventListener('touchstart', e => {
        const tx = e.touches[0].clientX; const ty = e.touches[0].clientY;
        meteors.forEach(m => {
            if(Math.hypot(m.x - tx, m.y - ty) < 40) {
                activeMeteor = m; m.isDragging = true; startT = {x:tx, y:ty};
                meteor.vx = 0; meteor.vy = 0;
            }
        });
    });

    canvas.addEventListener('touchend', e => {
        if(activeMeteor) {
            // 관성 유지: 드래그 속도 그대로 영원히 날아감
            activeMeteor.vx = (e.changedTouches[0].clientX - startT.x) * 0.15;
            activeMeteor.vy = (e.changedTouches[0].clientY - startT.y) * 0.15;
            activeMeteor.isDragging = false; activeMeteor = null;
        }
    });

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pauseBtn').innerText = isPaused ? '▶' : '⏸';
    }

    function changeSpeed(delta) {
        tempoScale = Math.max(0.1, Math.min(3.0, tempoScale + delta * 0.1)); // 0.1x ~ 3x 범위
    }

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
    }

    function render() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);
        drawGrid();
        resolveMeteorCollision(); // 운석 간 충돌 물리
        meteors.forEach(m => { m.update(); m.draw(); });
        requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
    resize(); render();
</script>
</body>
</html>
