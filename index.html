<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meteor Ping-Pong Art</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Pretendard', sans-serif; }
        canvas { display: block; }
        
        #ui-layer { position: fixed; top: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .btn { 
            pointer-events: auto; padding: 15px 30px; font-size: 0.9rem; font-weight: bold; 
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 50px; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn:active { background: #fff; color: #000; scale: 0.95; }
        #msg { color: rgba(255,255,255,0.4); font-size: 0.75rem; margin-top: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="spawn-btn" class="btn" onclick="spawnMeteor()">GENERATE METEOR</button>
        <div id="msg">DRAG TO FLING | TAP TO STOP</div>
    </div>

    <canvas id="artCanvas"></canvas>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let meteor = null;
        const friction = 0.985; // 공기 저항 (서서히 느려짐)
        const wallBounce = 0.9; // 벽에 부딪힐 때 탄성
        const notes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 음표를 모서리가 아닌 화면 중앙부에 고르게 분산 배치
            notes.length = 0;
            for(let i=0; i<15; i++) {
                notes.push({
                    x: Math.random() * (width * 0.8) + (width * 0.1),
                    y: Math.random() * (height * 0.7) + (height * 0.15),
                    active: 0
                });
            }
        }

        // 1. 초기엔 유성이 없다가 버튼 클릭 시 생성
        function spawnMeteor() {
            meteor = {
                x: width / 2,
                y: height / 2,
                vx: 0,
                vy: 0,
                radius: 8,
                trail: [],
                isDragging: false
            };
            document.getElementById('spawn-btn').innerText = "RESET";
        }

        // 터치/마우스 인터랙션
        let isMoving = false;
        let lastPos = { x: 0, y: 0 };

        canvas.addEventListener('pointerdown', e => {
            if(!meteor) return;
            const d = Math.hypot(e.clientX - meteor.x, e.clientY - meteor.y);
            
            // 유성을 터치하면 즉시 정지 (핑퐁 제어)
            if(d < 60) {
                meteor.vx = 0;
                meteor.vy = 0;
                meteor.isDragging = true;
            }
            lastPos = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('pointermove', e => {
            if(!meteor || !meteor.isDragging) return;
            
            // 드래그하는 속도를 계산하여 유성에 부여
            const dx = e.clientX - lastPos.x;
            const dy = e.clientY - lastPos.y;
            
            meteor.x = e.clientX;
            meteor.y = e.clientY;
            
            meteor.vx = dx * 0.5; // 던지는 힘 조절
            meteor.vy = dy * 0.5;
            
            lastPos = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('pointerup', () => {
            if(meteor) meteor.isDragging = false;
        });

        function update() {
            if (!meteor || meteor.isDragging) return;

            // 위치 업데이트
            meteor.x += meteor.vx;
            meteor.y += meteor.vy;

            // 2. 핑퐁 메커니즘 (벽 충돌 반사)
            if (meteor.x + meteor.radius > width || meteor.x - meteor.radius < 0) {
                meteor.vx *= -1 * wallBounce;
                meteor.x = meteor.x < 0 ? meteor.radius : width - meteor.radius;
            }
            if (meteor.y + meteor.radius > height || meteor.y - meteor.radius < 0) {
                meteor.vy *= -1 * wallBounce;
                meteor.y = meteor.y < 0 ? meteor.radius : height - meteor.radius;
            }

            // 마찰력 적용 (너무 빠르지 않게 서서히 감소)
            meteor.vx *= friction;
            meteor.vy *= friction;

            // 궤적(꼬리) 저장
            meteor.trail.push({ x: meteor.x, y: meteor.y });
            if (meteor.trail.length > 25) meteor.trail.shift();

            // 음표 충돌 체크
            notes.forEach(note => {
                const dist = Math.hypot(meteor.x - note.x, meteor.y - note.y);
                if (dist < 30 && note.active === 0) {
                    note.active = 30; // 애니메이션 프레임
                    // 여기서 '틱' 하는 핑퐁 사운드 연결 포인트
                }
                if (note.active > 0) note.active--;
            });
        }

        function draw() {
            // 잔상 효과를 위해 투명한 검정색으로 덮음
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            if (meteor) {
                // 유성 꼬리 그리기 (핑퐁 궤적)
                ctx.beginPath();
                meteor.trail.forEach((p, i) => {
                    ctx.lineTo(p.x, p.y);
                    ctx.strokeStyle = `rgba(0, 255, 200, ${i / 25})`;
                    ctx.lineWidth = i / 3;
                });
                ctx.stroke();

                // 유성 헤드
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#0ff';
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(meteor.x, meteor.y, meteor.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // 음표 배치 (화면 곳곳에 흩어짐)
            notes.forEach(note => {
                const alpha = note.active > 0 ? 1 : 0.2;
                const size = note.active > 0 ? 6 : 3;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(note.x, note.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                if(note.active > 0) {
                    ctx.strokeStyle = `rgba(0, 255, 255, ${note.active/30})`;
                    ctx.beginPath();
                    ctx.arc(note.x, note.y, 40 - note.active, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });

            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
