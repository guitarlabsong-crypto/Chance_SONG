<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleatoric Space V17 - Natural Cycle</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        #header {
            position: absolute; top: 0; width: 100%; height: 75px;
            background: rgba(0,0,0,0.95); display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            border-bottom: 1px solid #222;
        }
        #watermark { font-size: 10px; letter-spacing: 2px; color: #666; margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn {
            background: #001f3f; border: 1px solid #003366; color: #fff;
            padding: 6px 16px; border-radius: 20px; font-size: 11px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn:active { transform: scale(0.9); background: #003366; }
        #spawnBtn { border-color: #00ffcc; color: #00ffcc; }
        .label { color: #444; font-size: 9px; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="header">
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>
    <div class="controls">
        <div id="spawnBtn" class="btn" onclick="handleSpawn()">SPAWN RANDOM</div>
        <div style="width:10px"></div>
        <span class="label">SPEED</span>
        <div class="btn" onclick="changeSpeed(-1)">-</div>
        <div class="btn" onclick="changeSpeed(1)">+</div>
        <div class="btn" onclick="togglePause()" id="pauseBtn">PAUSE</div>
    </div>
</div>

<canvas id="space"></canvas>

<script>
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];
    
    const elements = [
        {s:'H', n:'Hydrogen', c:'#ffffff', m:1.0}, {s:'He', n:'Helium', c:'#ffcccc', m:4.0},
        {s:'Li', n:'Lithium', c:'#ccffcc', m:6.9}, {s:'Be', n:'Beryllium', c:'#c2ff00', m:9.0},
        {s:'B', n:'Boron', c:'#ffb5b5', m:10.8}, {s:'C', n:'Carbon', c:'#999999', m:12.0},
        {s:'N', n:'Nitrogen', c:'#3366ff', m:14.0}, {s:'O', n:'Oxygen', c:'#ff3300', m:16.0},
        {s:'F', n:'Fluorine', c:'#ffff00', m:19.0}, {s:'Ne', n:'Neon', c:'#ff00ff', m:20.1},
        {s:'Na', n:'Sodium', c:'#0000ff', m:23.0}, {s:'Mg', n:'Magnesium', c:'#ff6600', m:24.3},
        {s:'Al', n:'Aluminum', c:'#bdaebd', m:27.0}, {s:'Si', n:'Silicon', c:'#f0c8a0', m:28.1},
        {s:'P', n:'Phosphorus', c:'#ff9900', m:31.0}, {s:'S', n:'Sulfur', c:'#ffff00', m:32.1},
        {s:'Cl', n:'Chlorine', c:'#1ff01f', m:35.5}, {s:'Ar', n:'Argon', c:'#80ffff', m:39.9},
        {s:'K', n:'Potassium', c:'#8f40ad', m:39.1}, {s:'Ca', n:'Calcium', c:'#3dff00', m:40.1},
        {s:'Ti', n:'Titanium', c:'#bec2c7', m:47.8}, {s:'Fe', n:'Iron', c:'#8b8b83', m:55.8},
        {s:'Cu', n:'Copper', c:'#ff7f24', m:63.5}, {s:'Zn', n:'Zinc', c:'#7d80b0', m:65.4},
        {s:'Ag', n:'Silver', c:'#c0c0c0', m:107.8}, {s:'Au', n:'Gold', c:'#ffd700', m:197.0},
        {s:'Hg', n:'Mercury', c:'#b8b8b8', m:200.6}, {s:'Pb', n:'Lead', c:'#57595d', m:207.2},
        {s:'U', n:'Uranium', c:'#00ff00', m:238.0} 
    ];

    let width, height, isPaused = false, tempoScale = 1.0;
    const blockSize = 32; 
    let meteors = [];
    let hitBlocks = { t: -1, b: -1, l: -1, r: -1, color: '#fff' };
    let flashOpacity = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const mainGain = audioCtx.createGain();
    mainGain.gain.value = 0.5; mainGain.connect(audioCtx.destination);

    function playScaledNote(index, radius, isExplosion = false) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = isExplosion ? 'sawtooth' : 'sine';
        osc.frequency.setValueAtTime(freqs[index % 12], audioCtx.currentTime);
        const volume = isExplosion ? 0.7 : Math.max(0.05, (radius / 22) * 0.4);
        g.gain.setValueAtTime(volume, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
        osc.connect(g); g.connect(mainGain);
        osc.start(); osc.stop(audioCtx.currentTime + 1.2);
    }

    class Meteor {
        constructor(x, y, elem, radius = 22, vx = 0, vy = 0) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.radius = radius;
            this.elem = elem;
            this.angle = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.05;
            this.history = [];
            this.isDragging = false;
            this.stability = 10; // H2O 전용 내구도
            this.vertices = this.createRockShape();
        }

        createRockShape() {
            let v = [];
            for(let i=0; i<8; i++) {
                const a = (i/8)*Math.PI*2;
                const r = this.radius * (0.8 + Math.random()*0.4);
                v.push({x: Math.cos(a)*r, y: Math.sin(a)*r});
            }
            return v;
        }

        update() {
            if (isPaused || this.isDragging) return;
            if(Math.hypot(this.vx, this.vy) > 0.1) {
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > 10) this.history.shift();
            }
            this.x += this.vx * tempoScale;
            this.y += this.vy * tempoScale;
            this.angle += this.rotationSpeed * tempoScale;

            const limits = { t: 75+blockSize+this.radius, b: height-blockSize-this.radius, l: blockSize+this.radius, r: width-blockSize-this.radius };

            if (this.x < limits.l || this.x > limits.r) {
                this.vx *= -0.96;
                if(this.elem.s === 'H2O') this.stability--;
                const idx = Math.floor(((this.y - 75) / (height - 75)) * 12);
                hitBlocks.color = this.elem.c;
                if (this.x < limits.l) { this.x = limits.l; hitBlocks.l = idx; } else { this.x = limits.r; hitBlocks.r = idx; }
                playScaledNote(idx, this.radius);
            }
            if (this.y < limits.t || this.y > limits.b) {
                this.vy *= -0.96;
                if(this.elem.s === 'H2O') this.stability--;
                const idx = Math.floor((this.x / width) * 12);
                hitBlocks.color = this.elem.c;
                if (this.y < limits.t) { this.y = limits.t; hitBlocks.t = idx; } else { this.y = limits.b; hitBlocks.b = idx; }
                playScaledNote(idx, this.radius);
            }
        }

        draw() {
            this.history.forEach((pos, i) => {
                ctx.globalAlpha = (i / 10) * 0.15;
                ctx.fillStyle = this.elem.c;
                ctx.beginPath(); ctx.arc(pos.x, pos.y, this.radius * (i/10), 0, Math.PI*2); ctx.fill();
            });
            ctx.save();
            ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            // H2O일 경우 안정도에 따라 떨림 효과
            if(this.elem.s === 'H2O' && this.stability < 4) {
                ctx.translate((Math.random()-0.5)*3, (Math.random()-0.5)*3);
            }
            ctx.fillStyle = this.elem.c; ctx.shadowBlur = 15; ctx.shadowColor = this.elem.c;
            ctx.beginPath(); ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
            this.vertices.forEach(v => ctx.lineTo(v.x, v.y));
            ctx.closePath(); ctx.fill();
            ctx.rotate(-this.angle);
            ctx.fillStyle = "#000"; ctx.font = `bold ${this.radius*0.7}px Arial`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(this.elem.s, 0, 0);
            ctx.restore(); ctx.globalAlpha = 1.0;
        }
    }

    function resolveCollisions() {
        let toRemove = []; let toAdd = [];
        for (let i = 0; i < meteors.length; i++) {
            if (toRemove.includes(i)) continue;
            for (let j = i + 1; j < meteors.length; j++) {
                if (toRemove.includes(j)) continue;
                let m1 = meteors[i], m2 = meteors[j];
                let dist = Math.hypot(m2.x - m1.x, m2.y - m1.y);
                
                if (dist < m1.radius + m2.radius) {
                    const combo = m1.elem.s + m2.elem.s;

                    // 1. 나트륨 폭발
                    if (combo.includes('Na') && (combo.includes('O') || combo.includes('Cl'))) {
                        flashOpacity = 0.7;
                        playScaledNote(0, 50, true);
                        toRemove.push(i, j);
                        for(let k=0; k<3; k++) {
                            const a = Math.random()*Math.PI*2;
                            toAdd.push(new Meteor(m1.x, m1.y, elements[5], 10, Math.cos(a)*4, Math.sin(a)*4));
                        }
                        break;
                    }

                    // 2. 수소 + 산소 합체
                    if ((m1.elem.s === 'H' && m2.elem.s === 'O') || (m1.elem.s === 'O' && m2.elem.s === 'H')) {
                        toRemove.push(i, j);
                        const newM = new Meteor((m1.x+m2.x)/2, (m1.y+m2.y)/2, {s:'H2O', n:'Water', c:'#00ffff', m:18}, 28);
                        newM.vx = (m1.vx + m2.vx)*0.5; newM.vy = (m1.vy + m2.vy)*0.5;
                        toAdd.push(newM);
                        break;
                    }

                    // 일반 튕기기 및 겹침 방지
                    let angle = Math.atan2(m2.y - m1.y, m2.x - m1.x);
                    let overlap = (m1.radius + m2.radius) - dist;
                    m1.x -= Math.cos(angle) * overlap/2;
                    m1.y -= Math.sin(angle) * overlap/2;
                    m2.x += Math.cos(angle) * overlap/2;
                    m2.y += Math.sin(angle) * overlap/2;

                    let tempVx = m1.vx; m1.vx = m2.vx; m2.vx = tempVx;
                    let tempVy = m1.vy; m1.vy = m2.vy; m2.vy = tempVy;
                    
                    if(m1.elem.s === 'H2O') m1.stability--;
                    if(m2.elem.s === 'H2O') m2.stability--;
                }
            }
        }

        // H2O 분해 체크
        meteors.forEach((m, idx) => {
            if(m.elem.s === 'H2O' && m.stability <= 0 && !toRemove.includes(idx)) {
                toRemove.push(idx);
                // 다시 H 2개, O 1개로 분해
                toAdd.push(new Meteor(m.x-10, m.y, elements[0], 15, -2, -1));
                toAdd.push(new Meteor(m.x+10, m.y, elements[0], 15, 2, 1));
                toAdd.push(new Meteor(m.x, m.y+10, elements[7], 18, 0, 2));
                playScaledNote(11, 10); // 분해 시 청명한 소리
            }
        });

        const uniqueRemove = [...new Set(toRemove)].sort((a, b) => b - a);
        uniqueRemove.forEach(idx => meteors.splice(idx, 1));
        toAdd.forEach(m => meteors.push(m));
    }

    function handleSpawn() {
        const randomElem = elements[Math.floor(Math.random() * elements.length)];
        meteors.push(new Meteor(width/2, (height+75)/2, randomElem, 22));
    }

    function drawGrid() {
        const w = width / 12, h = (height - 75) / 12;
        ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        for(let i=0; i<12; i++) {
            const drawBlock = (x, y, wi, hi, hit) => {
                ctx.fillStyle = hit ? hitBlocks.color : 'rgba(255,255,255,0.05)';
                ctx.beginPath(); ctx.roundRect(x, y, wi, hi, 15); ctx.fill();
            };
            drawBlock(w*i+3, 78, w-6, blockSize-6, hitBlocks.t === i);
            drawBlock(w*i+3, height-blockSize+3, w-6, blockSize-6, hitBlocks.b === i);
            drawBlock(3, 75+h*i+3, blockSize-6, h-6, hitBlocks.l === i);
            drawBlock(width-blockSize+3, 75+h*i+3, blockSize-6, h-6, hitBlocks.r === i);
            ctx.fillStyle = '#222';
            ctx.fillText(notes[i], w*i+w/2, 75+blockSize/2); ctx.fillText(notes[i], w*i+w/2, height-blockSize/2);
            ctx.fillText(notes[i], blockSize/2, 75+h*i+h/2); ctx.fillText(notes[i], width-blockSize/2, 75+h*i+h/2);
        }
        for(let k in hitBlocks) if(k !== 'color') hitBlocks[k] = -1;
    }

    let activeMeteor = null; let startT = {x:0, y:0};
    canvas.addEventListener('pointerdown', e => {
        const tx = e.clientX; const ty = e.clientY;
        meteors.forEach(m => {
            if(Math.hypot(m.x - tx, m.y - ty) < m.radius + 30) {
                activeMeteor = m; m.isDragging = true; startT = {x:tx, y:ty};
                m.vx = 0; m.vy = 0;
            }
        });
    });
    canvas.addEventListener('pointermove', e => { if(activeMeteor && activeMeteor.isDragging) { activeMeteor.x = e.clientX; activeMeteor.y = e.clientY; } });
    canvas.addEventListener('pointerup', e => {
        if(activeMeteor) {
            activeMeteor.vx = (e.clientX - startT.x) * 0.2;
            activeMeteor.vy = (e.clientY - startT.y) * 0.2;
            activeMeteor.isDragging = false; activeMeteor = null;
        }
    });

    function changeSpeed(delta) { tempoScale = Math.max(0.1, Math.min(3.0, tempoScale + delta * 0.1)); }
    function togglePause() { isPaused = !isPaused; document.getElementById('pauseBtn').innerText = isPaused ? 'RESUME' : 'PAUSE'; }
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }

    function render() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);
        if(flashOpacity > 0) { ctx.fillStyle = `rgba(255,255,255,${flashOpacity})`; ctx.fillRect(0,0,width,height); flashOpacity -= 0.05; }
        drawGrid();
        if(!isPaused) resolveCollisions();
        meteors.forEach(m => { m.update(); m.draw(); });
        requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
    resize(); 
    meteors.push(new Meteor(window.innerWidth/2, (window.innerHeight+75)/2, elements[25], 22, 0, 0));
    render();
</script>
</body>
</html>
