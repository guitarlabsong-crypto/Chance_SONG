<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meteor Triple Pendulum Art</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* UI 레이어 */
        #ui-layer { position: fixed; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .btn { 
            pointer-events: auto; padding: 12px 24px; font-size: 1rem; font-weight: bold; 
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #fff; border-radius: 30px;
            cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s;
        }
        .btn:active { background: #fff; color: #000; }
        #info { color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="spawn-btn" class="btn" onclick="spawnMeteor()">GENERATE METEOR</button>
        <div id="info">Drag to push | Tap to stop</div>
    </div>

    <canvas id="artCanvas"></canvas>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        // 물리 변수 (삼중 진자 매커니즘)
        let meteor = null;
        const g = 0.3; // 중력 (속도가 너무 빠르지 않게 조정)
        const damping = 0.995; // 공기 저항 (에너지 손실)

        // 음표(Note) 위치 데이터 - 박스 모서리가 아닌 화면에 고르게 배치
        const notes = [];
        const noteCount = 12;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 음표들을 화면 곳곳에 배치 (모서리 집중 방지)
            notes.length = 0;
            for(let i=0; i<noteCount; i++) {
                notes.push({
                    x: Math.random() * (width - 100) + 50,
                    y: Math.random() * (height - 200) + 100,
                    freq: 220 * Math.pow(1.059, i),
                    active: false
                });
            }
        }

        // 1. 유성 생성 (처음엔 없고 버튼 클릭 시 중앙 생성)
        function spawnMeteor() {
            const centerX = width / 2;
            const centerY = height / 3;
            meteor = {
                origin: { x: centerX, y: centerY },
                // 삼중 진자의 세 마디 (길이와 질량)
                l1: 60, l2: 50, l3: 40,
                m1: 10, m2: 10, m3: 10,
                // 각도 및 각속도
                a1: 0, a2: 0, a3: 0,
                v1: 0, v2: 0, v3: 0,
                isDragging: false,
                trail: []
            };
            document.getElementById('spawn-btn').innerText = "RESET METEOR";
        }

        // 드래그 및 터치 인터랙션
        let isMouseDown = false;
        let lastMouse = { x: 0, y: 0 };

        canvas.addEventListener('pointerdown', e => {
            if(!meteor) return;
            const dist = Math.hypot(e.clientX - getMeteorPos().x, e.clientY - getMeteorPos().y);
            
            if(dist < 50) { // 유성을 터치하면 멈춤
                meteor.v1 = meteor.v2 = meteor.v3 = 0;
                meteor.isDragging = true;
            }
            isMouseDown = true;
            lastMouse = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('pointermove', e => {
            if(meteor && meteor.isDragging) {
                // 드래그 방향으로 각속도 부여 (자유로운 방향으로 밀기)
                const dx = e.clientX - lastMouse.x;
                meteor.v1 += dx * 0.001;
                meteor.v2 += dx * 0.002;
                meteor.v3 += dx * 0.003;
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });

        canvas.addEventListener('pointerup', () => {
            if(meteor) meteor.isDragging = false;
            isMouseDown = false;
        });

        function getMeteorPos() {
            if(!meteor) return {x:-100, y:-100};
            const x1 = meteor.origin.x + meteor.l1 * Math.sin(meteor.a1);
            const y1 = meteor.origin.y + meteor.l1 * Math.cos(meteor.a1);
            const x2 = x1 + meteor.l2 * Math.sin(meteor.a2);
            const y2 = y1 + meteor.l2 * Math.cos(meteor.a2);
            const x3 = x2 + meteor.l3 * Math.sin(meteor.a3);
            const y3 = y2 + meteor.l3 * Math.cos(meteor.a3);
            return { x: x3, y: y3, x1, y1, x2, y2 };
        }

        function update() {
            if (meteor && !meteor.isDragging) {
                // 삼중 진자 물리 엔진 (단순화된 근사식 적용 - 속도 제어 중심)
                let force1 = -g * Math.sin(meteor.a1);
                let force2 = -g * Math.sin(meteor.a2);
                let force3 = -g * Math.sin(meteor.a3);

                meteor.v1 = (meteor.v1 + force1 * 0.05) * damping;
                meteor.v2 = (meteor.v2 + force2 * 0.07) * damping;
                meteor.v3 = (meteor.v3 + force3 * 0.09) * damping;

                meteor.a1 += meteor.v1;
                meteor.a2 += meteor.v2;
                meteor.a3 += meteor.v3;

                // 꼬리 데이터 저장
                const pos = getMeteorPos();
                meteor.trail.push({x: pos.x, y: pos.y});
                if(meteor.trail.length > 30) meteor.trail.shift();

                // 음표 충돌 감지
                notes.forEach(note => {
                    const d = Math.hypot(pos.x - note.x, pos.y - note.y);
                    if(d < 25 && !note.active) {
                        note.active = true;
                        setTimeout(() => note.active = false, 500);
                        // 여기서 소리 발생 로직 연결 가능
                    }
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // 잔상 효과
            ctx.fillRect(0, 0, width, height);

            if(meteor) {
                const p = getMeteorPos();
                
                // 1. 진자 연결선 (삼중 구조 시각화)
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.beginPath();
                ctx.moveTo(meteor.origin.x, meteor.origin.y);
                ctx.lineTo(p.x1, p.y1);
                ctx.lineTo(p.x2, p.y2);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();

                // 2. 유성 꼬리 (삼중진자 궤적)
                ctx.beginPath();
                meteor.trail.forEach((t, i) => {
                    ctx.lineTo(t.x, t.y);
                    ctx.strokeStyle = `rgba(0, 200, 255, ${i / 30})`;
                    ctx.lineWidth = i / 5;
                });
                ctx.stroke();

                // 3. 유성 헤드
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0cf';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // 4. 음표 배치 (화면 분산)
            notes.forEach(note => {
                ctx.fillStyle = note.active ? '#fff' : 'rgba(255,255,255,0.2)';
                ctx.beginPath();
                ctx.arc(note.x, note.y, 4, 0, Math.PI*2);
                ctx.fill();
                if(note.active) {
                    ctx.strokeStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(note.x, note.y, 20, 0, Math.PI*2);
                    ctx.stroke();
                }
            });

            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
