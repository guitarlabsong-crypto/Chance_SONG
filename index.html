<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleatoric Space V4 - SONG, YOUNG-MIN</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        #header {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.9); display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            border-bottom: 1px solid #444;
        }
        #watermark { font-size: 11px; letter-spacing: 2px; color: #0ff; margin-bottom: 5px; font-weight: bold; }
        .controls { display: flex; gap: 25px; }
        .btn {
            background: none; border: 1px solid #fff; color: white;
            width: 32px; height: 32px; border-radius: 50%; font-size: 18px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="header">
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>
    <div class="controls">
        <div class="btn" onclick="resetMeteor()">⭐</div>
        <div class="btn" onclick="togglePause()" id="pauseBtn">⏸</div>
    </div>
</div>

<canvas id="space"></canvas>

<script>
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];
    
    let width, height;
    let isPaused = false;
    const blockSize = 30; // 벽돌 두께
    let hitBlocks = { top: -1, bottom: -1, left: -1, right: -1 };

    // --- Audio Context & Reverb (웅장한 공간감) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const reverbBus = audioCtx.createGain();
    const delay = audioCtx.createDelay();
    const feedback = audioCtx.createGain();

    delay.delayTime.value = 0.4;
    feedback.gain.value = 0.3;
    reverbBus.gain.value = 0.5;

    delay.connect(feedback);
    feedback.connect(delay);
    delay.connect(audioCtx.destination);
    reverbBus.connect(delay);
    reverbBus.connect(audioCtx.destination);

    function playNote(index) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine'; 
        osc.frequency.setValueAtTime(freqs[index % 12], audioCtx.currentTime);
        g.gain.setValueAtTime(0.4, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2);
        osc.connect(g);
        g.connect(reverbBus);
        osc.start();
        osc.stop(audioCtx.currentTime + 2);
    }

    class Meteor {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = window.innerWidth / 2;
            this.y = (window.innerHeight + 60) / 2;
            this.vx = 0;
            this.vy = 0;
            this.radius = 12;
            this.isDragging = false;
            this.friction = 0.998; // 아주 미세한 감속
        }
        update() {
            if (isPaused || this.isDragging) return;

            this.x += this.vx;
            this.y += this.vy;
            this.vx *= this.friction;
            this.vy *= this.friction;

            const topLimit = 60 + blockSize + this.radius;
            const bottomLimit = height - blockSize - this.radius;
            const leftLimit = blockSize + this.radius;
            const rightLimit = width - blockSize - this.radius;

            // 벽 충돌 (핑퐁 원리)
            if (this.x < leftLimit) {
                this.x = leftLimit; this.vx *= -1;
                const idx = Math.floor(((this.y - 60) / (height - 60)) * 12);
                hitBlocks.left = idx; playNote(idx);
            } else if (this.x > rightLimit) {
                this.x = rightLimit; this.vx *= -1;
                const idx = Math.floor(((this.y - 60) / (height - 60)) * 12);
                hitBlocks.right = idx; playNote(idx);
            }

            if (this.y < topLimit) {
                this.y = topLimit; this.vy *= -1;
                const idx = Math.floor((this.x / width) * 12);
                hitBlocks.top = idx; playNote(idx);
            } else if (this.y > bottomLimit) {
                this.y = bottomLimit; this.vy *= -1;
                const idx = Math.floor((this.x / width) * 12);
                hitBlocks.bottom = idx; playNote(idx);
            }
        }
        draw() {
            // 유성 빛 효과
            ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    const meteor = new Meteor();

    function drawGrid() {
        ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const w = width / 12;
        const h = (height - 60) / 12;

        for(let i=0; i<12; i++) {
            // 상/하 벽돌
            let tx = w * i;
            ctx.fillStyle = (hitBlocks.top === i) ? '#0ff' : 'rgba(255,255,255,0.1)';
            ctx.fillRect(tx+1, 61, w-2, blockSize);
            ctx.fillStyle = (hitBlocks.top === i) ? '#000' : '#888';
            ctx.fillText(notes[i], tx + w/2, 60 + blockSize/2);

            ctx.fillStyle = (hitBlocks.bottom === i) ? '#0ff' : 'rgba(255,255,255,0.1)';
            ctx.fillRect(tx+1, height - blockSize - 1, w-2, blockSize);
            ctx.fillStyle = (hitBlocks.bottom === i) ? '#000' : '#888';
            ctx.fillText(notes[i], tx + w/2, height - blockSize/2);

            // 좌/우 벽돌
            let ty = 60 + (h * i);
            ctx.fillStyle = (hitBlocks.left === i) ? '#0ff' : 'rgba(255,255,255,0.1)';
            ctx.fillRect(1, ty+1, blockSize, h-2);
            ctx.fillStyle = (hitBlocks.left === i) ? '#000' : '#888';
            ctx.fillText(notes[i], blockSize/2, ty + h/2);

            ctx.fillStyle = (hitBlocks.right === i) ? '#0ff' : 'rgba(255,255,255,0.1)';
            ctx.fillRect(width - blockSize - 1, ty+1, blockSize, h-2);
            ctx.fillStyle = (hitBlocks.right === i) ? '#000' : '#888';
            ctx.fillText(notes[i], width - blockSize/2, ty + h/2);
        }
        // 히트 상태 리셋 (짧은 잔상)
        for(let key in hitBlocks) hitBlocks[key] = -1;
    }

    let startT = {x:0, y:0};
    canvas.addEventListener('touchstart', e => {
        const tx = e.touches[0].clientX; const ty = e.touches[0].clientY;
        if (Math.hypot(meteor.x - tx, meteor.y - ty) < 40) {
            meteor.isDragging = true;
            startT = {x: tx, y: ty};
            meteor.vx = 0; meteor.vy = 0;
        }
    });
    canvas.addEventListener('touchend', e => {
        if(meteor.isDragging) {
            // 속도 감도를 낮춰서 유성이 너무 빠르지 않게 조절
            meteor.vx = (e.changedTouches[0].clientX - startT.x) * 0.08;
            meteor.vy = (e.changedTouches[0].clientY - startT.y) * 0.08;
            meteor.isDragging = false;
        }
    });

    function resetMeteor() { meteor.reset(); }
    function togglePause() { 
        isPaused = !isPaused; 
        document.getElementById('pauseBtn').innerText = isPaused ? '▶' : '⏸';
    }

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        // 가로세로 전환 시 유성이 벽 밖으로 나가지 않게 위치 강제 조정
        meteor.x = Math.max(blockSize+15, Math.min(width-blockSize-15, meteor.x));
        meteor.y = Math.max(60+blockSize+15, Math.min(height-blockSize-15, meteor.y));
    }

    function render() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(0, 0, width, height);
        drawGrid();
        meteor.update();
        meteor.draw();
        requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
    resize(); render();
</script>
</body>
</html>
