<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONG, YOUNG-MIN Guitar Lab - Aleatoric Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        #header {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.7); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        #watermark { font-size: 12px; color: #aaa; margin-bottom: 5px; letter-spacing: 1px; }
        .controls { display: flex; gap: 10px; }
        button {
            padding: 5px 15px; background: transparent; border: 1px solid #fff;
            color: white; border-radius: 20px; font-size: 12px; cursor: pointer;
        }
        button:active { background: #fff; color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="header">
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>
    <div class="controls">
        <button onclick="createMeteor()">☄️ 유성 소환</button>
        <button onclick="togglePause()">⏸ 일시 정지</button>
    </div>
</div>

<canvas id="spaceCanvas"></canvas>

<script>
    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');
    let meteors = [];
    let isPaused = false;

    // 12음계 주파수 (C4 부터 B4까지)
    const scales = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; // 기타와 유사한 부드러운 사인파
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 1);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Meteor {
        constructor(x, y, vx, vy) {
            this.x = x; this.y = y;
            this.vx = vx; this.vy = vy;
            this.radius = 8;
            this.history = []; // 꼬리 효과를 위한 경로 저장
        }

        update() {
            if (isPaused) return;
            
            this.x += this.vx;
            this.y += this.vy;

            // 벽 충돌 감지 (가로)
            if (this.x - this.radius <= 0 || this.x + this.radius >= canvas.width) {
                this.vx *= -1;
                const noteIndex = Math.floor((this.y / canvas.height) * 12);
                playTone(scales[Math.abs(noteIndex % 12)]);
            }
            // 벽 충돌 감지 (세로)
            if (this.y - this.radius <= 60 || this.y + this.radius >= canvas.height) {
                this.vy *= -1;
                const noteIndex = Math.floor((this.x / canvas.width) * 12);
                playTone(scales[Math.abs(noteIndex % 12)]);
            }

            this.history.push({x: this.x, y: this.y});
            if (this.history.length > 20) this.history.shift();
        }

        draw() {
            // 꼬리 그리기
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            for(let i=0; i<this.history.length; i++) {
                ctx.lineTo(this.history[i].x, this.history[i].y);
            }
            ctx.stroke();

            // 유성 본체
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // 드래그 구현
    let startX, startY;
    canvas.addEventListener('touchstart', e => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    });

    canvas.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const vx = (endX - startX) * 0.1;
        const vy = (endY - startY) * 0.1;
        meteors.push(new Meteor(startX, startY, vx, vy));
    });

    function createMeteor() {
        const x = canvas.width / 2;
        const y = canvas.height / 2;
        const vx = (Math.random() - 0.5) * 10;
        const vy = (Math.random() - 0.5) * 10;
        meteors.push(new Meteor(x, y, vx, vy));
    }

    function togglePause() {
        isPaused = !isPaused;
    }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 5, 0.2)'; // 잔상 효과
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        meteors.forEach(m => {
            m.update();
            m.draw();
        });
        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
