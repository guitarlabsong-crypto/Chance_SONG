<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleatoric Space V3 - SONG, YOUNG-MIN</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; color: #fff; }
        #header {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.85); display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            border-bottom: 1px solid #333;
        }
        #watermark { font-size: 10px; letter-spacing: 1.5px; color: #0ff; margin-bottom: 6px; }
        .controls { display: flex; gap: 15px; }
        .btn {
            background: none; border: 1px solid #fff; color: white;
            width: 30px; height: 30px; border-radius: 50%; font-size: 16px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="header">
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>
    <div class="controls">
        <div class="btn" onclick="resetPhysics()">⭐</div>
        <div class="btn" onclick="togglePause()" id="pauseBtn">⏸</div>
    </div>
</div>

<canvas id="space"></canvas>

<script>
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];
    
    let width, height, cx, cy;
    let isPaused = false;
    let blockSize = 25; // 벽돌 두께
    let hitBlocks = { top: -1, bottom: -1, left: -1, right: -1 };

    // --- Audio Context with Reverb ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const mainGain = audioCtx.createGain();
    mainGain.gain.value = 0.3;
    mainGain.connect(audioCtx.destination);

    function playNote(index) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freqs[index % 12], audioCtx.currentTime);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);
        osc.connect(g);
        g.connect(mainGain);
        osc.start();
        osc.stop(audioCtx.currentTime + 1.2);
    }

    // --- Physics: Triple Pendulum (유성 본체 운동) ---
    // 물리 파라미터
    const g = 0.5; // 중력 (느리게 조정)
    const m = [10, 10, 10]; // 질량
    const l = [60, 60, 60]; // 길이 (화면 비율에 맞게 조정 예정)
    let a = [Math.PI / 2, Math.PI / 2, Math.PI / 2]; // 초기 각도
    let av = [0, 0, 0]; // 각속도
    let aa = [0, 0, 0]; // 각가속도
    const friction = 0.995; // 미세한 마찰력 (느려짐 유도)

    let meteor = { x: 0, y: 0, radius: 10, isDragging: false };
    let history = [];

    function solvePhysics() {
        if (isPaused || meteor.isDragging) return;

        // 삼중 진자 물리 방정식 (단순화된 근사치 적용 - 혼돈 유지)
        for(let i=0; i<3; i++) {
            let num = -g * (2 * m[i] + m[(i+1)%3]) * Math.sin(a[i]);
            // ... (복잡한 삼중진자 공식 생략, 카오스 거동을 위한 단순화 적용)
            aa[i] = num / (l[i] * (2 * m[i] + m[(i+1)%3])); 
            
            // 미세한 랜덤 섭동 (우연성 강화)
            aa[i] += (Math.random() - 0.5) * 0.01;

            av[i] += aa[i];
            av[i] *= friction; // 마찰 적용
            a[i] += av[i];
        }

        // 각도를 좌표로 변환
        let x1 = cx + l[0] * Math.sin(a[0]);
        let y1 = cy + l[0] * Math.cos(a[0]);
        let x2 = x1 + l[1] * Math.sin(a[1]);
        let y2 = y1 + l[1] * Math.cos(a[1]);
        meteor.x = x2 + l[2] * Math.sin(a[2]); // 유성 본체 위치 (마지막 마디)
        meteor.y = y2 + l[2] * Math.cos(a[2]);

        // 벽 충돌 감지 및 튕김 (에너지 손실 포함)
        const minY = 60 + blockSize + meteor.radius;
        const maxY = height - blockSize - meteor.radius;
        const minX = blockSize + meteor.radius;
        const maxX = width - blockSize - meteor.radius;

        if (meteor.y < minY || meteor.y > maxY) {
            av[0] *= -0.8; av[1] *= -0.8; av[2] *= -0.8; // 각속도 반전 및 에너지 감소
            a[0] += av[0]; // 끼임 방지
            const idx = Math.floor((meteor.x / width) * 12);
            if (meteor.y < minY) hitBlocks.top = idx; else hitBlocks.bottom = idx;
            playNote(idx);
        }
        if (meteor.x < minX || meteor.x > maxX) {
            av[0] *= -0.8; av[1] *= -0.8; av[2] *= -0.8;
            a[0] += av[0];
            const idx = Math.floor(((meteor.y - 60) / (height - 60)) * 12);
            if (meteor.x < minX) hitBlocks.left = idx; else hitBlocks.right = idx;
            playNote(idx);
        }

        history.push({x: meteor.x, y: meteor.y});
        if (history.length > 25) history.shift();
    }

    function resetPhysics() {
        cx = width / 2; cy = height / 2;
        // 길이를 화면 크기에 맞게 조정 (폰 가로세로 대응)
        const minDim = Math.min(width, height);
        l[0] = l[1] = l[2] = minDim * 0.15; 
        
        a = [Math.PI / 1.2, Math.PI / 2, Math.PI / 3]; // 약간 비대칭 초기 각도
        av = [0, 0, 0];
        history = [];
        // 초기 위치 계산
        solvePhysics(); 
    }

    function draw() {
        // 배경 잔상
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, width, height);

        drawGrid();

        // 궤적
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
        ctx.lineWidth = 2;
        history.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.stroke();

        // 유성 본체
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
        ctx.beginPath(); ctx.arc(meteor.x, meteor.y, meteor.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }

    function drawGrid() {
        ctx.font = '11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        
        // 상단/하단 벽돌
        const w = width / 12;
        for(let i=0; i<12; i++) {
            let x = w * i;
            // 상단
            ctx.fillStyle = hitBlocks.top === i ? '#0ff' : 'rgba(255,255,255,0.1)';
            ctx.fillRect(x+1, 61, w-2, blockSize);
            ctx.fillStyle = hitBlocks.top === i ? '#000' : '#fff'; ctx.fillText(notes[i], x + w/2, 60 + blockSize/2);
            // 하단
            ctx.fillStyle = hitBlocks.bottom === i ? '#0ff' : 'rgba(255,255,255,0.1)';
            ctx.fillRect(x+1, height - blockSize - 1, w-2, blockSize);
            ctx.fillStyle = hitBlocks.bottom === i ? '#000' : '#fff'; ctx.fillText(notes[i], x + w/2, height - blockSize/2);
        }

        // 좌측/우측 벽돌
        const sideH = (height - 60) / 12;
        for(let i=0; i<12; i++) {
            let y = 60 + (sideH * i);
            // 좌측
            ctx.fillStyle = hitBlocks.left === i ? '#0ff' : 'rgba(255,255,255,0.1)';
            ctx.fillRect(1, y+1, blockSize, sideH-2);
            ctx.fillStyle = hitBlocks.left === i ? '#000' : '#fff'; ctx.fillText(notes[i], blockSize/2, y + sideH/2);
            // 우측
            ctx.fillStyle = hitBlocks.right === i ? '#0ff' : 'rgba(255,255,255,0.1)';
            ctx.fillRect(width - blockSize - 1, y+1, blockSize, sideH-2);
            ctx.fillStyle = hitBlocks.right === i ? '#000' : '#fff'; ctx.fillText(notes[i], width - blockSize/2, y + sideH/2);
        }
        // 하이라이트 초기화
        Object.keys(hitBlocks).forEach(k => hitBlocks[k] = -1);
    }

    let startT = {x:0, y:0};
    canvas.addEventListener('touchstart', e => {
        const tx = e.touches[0].clientX; const ty = e.touches[0].clientY;
        if (Math.hypot(meteor.x - tx, meteor.y - ty) < 30) {
            meteor.isDragging = true;
            startT = {x: tx, y: ty};
            av = [0, 0, 0]; // 드래그 시 물리 멈춤
        }
    });
    canvas.addEventListener('touchend', e => {
        if(meteor.isDragging) {
            // 던지는 힘을 각속도로 변환 (약하게 조정)
            av[0] = (e.changedTouches[0].clientX - startT.x) * 0.001;
            av[1] = (e.changedTouches[0].clientY - startT.y) * 0.001;
            meteor.isDragging = false;
        }
    });

    function togglePause() { 
        isPaused = !isPaused; 
        document.getElementById('pauseBtn').innerText = isPaused ? '▶' : '⏸';
    }

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        resetPhysics(); // 화면 크기 변경 시 물리 초기화 (오류 방지)
    }

    function render() {
        solvePhysics();
        draw();
        requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
    resize(); render();
</script>
</body>
</html>
