<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleatoric Space V6 - SONG, YOUNG-MIN Guitar Lab</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        #header {
            position: absolute; top: 0; width: 100%; height: 70px;
            background: #000; display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            border-bottom: 1px solid #222;
        }
        #watermark { font-size: 10px; letter-spacing: 2px; color: #444; margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 15px; }
        .btn {
            background: #001f3f; border: 1px solid #003366; color: #fff;
            padding: 5px 15px; border-radius: 4px; font-size: 11px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:active { background: #003366; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="header">
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>
    <div class="controls">
        <div class="btn" onclick="spawnMeteor()">SPAWN</div>
        <div class="btn" onclick="togglePause()" id="pauseBtn">PAUSE</div>
    </div>
</div>

<canvas id="space"></canvas>

<script>
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];
    
    let width, height;
    let isPaused = false;
    const blockSize = 30; 
    let meteors = [];
    let hitBlocks = { top: -1, bottom: -1, left: -1, right: -1 };

    // --- Audio Context & Reverb ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const convolver = audioCtx.createConvolver();
    const mainGain = audioCtx.createGain();
    mainGain.gain.value = 0.5;

    function createImpulseResponse(duration, decay) {
        const length = audioCtx.sampleRate * duration;
        const impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
        for (let channel = 0; channel < 2; channel++) {
            const data = impulse.getChannelData(channel);
            for (let i = 0; i < length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
        }
        return impulse;
    }
    convolver.buffer = createImpulseResponse(3, 3);
    convolver.connect(audioCtx.destination);
    mainGain.connect(convolver);
    mainGain.connect(audioCtx.destination);

    function playNote(index) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freqs[index % 12], audioCtx.currentTime);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
        osc.connect(g);
        g.connect(mainGain);
        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
    }

    class Meteor {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.vx = 0; this.vy = 0;
            this.radius = 12; // 크기를 작게 조정
            this.angle = 0;
            this.rotationSpeed = (Math.random() - 0.5) * 0.08;
            this.isDragging = false;
            this.vertices = [];
            for(let i=0; i<10; i++) {
                const a = (i / 10) * Math.PI * 2;
                const r = this.radius * (0.8 + Math.random() * 0.4);
                this.vertices.push({x: Math.cos(a) * r, y: Math.sin(a) * r});
            }
        }
        update() {
            if (isPaused || this.isDragging) return;
            this.x += this.vx;
            this.y += this.vy;
            this.angle += this.rotationSpeed;

            const limits = { t: 70+blockSize+this.radius, b: height-blockSize-this.radius, l: blockSize+this.radius, r: width-blockSize-this.radius };

            if (this.x < limits.l || this.x > limits.r) {
                this.vx *= -1;
                this.rotationSpeed += (Math.random()-0.5)*0.02;
                const idx = Math.floor(((this.y - 70) / (height - 70)) * 12);
                if (this.x < limits.l) { this.x = limits.l; hitBlocks.left = idx; } else { this.x = limits.r; hitBlocks.right = idx; }
                playNote(idx);
            }
            if (this.y < limits.t || this.y > limits.b) {
                this.vy *= -1;
                this.rotationSpeed += (Math.random()-0.5)*0.02;
                const idx = Math.floor((this.x / width) * 12);
                if (this.y < limits.t) { this.y = limits.t; hitBlocks.top = idx; } else { this.y = limits.b; hitBlocks.bottom = idx; }
                playNote(idx);
            }
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.fillStyle = '#ff6600'; // 주황색 바위
            ctx.beginPath();
            ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
            this.vertices.forEach(v => ctx.lineTo(v.x, v.y));
            ctx.closePath();
            ctx.shadowBlur = 15; ctx.shadowColor = '#ff6600';
            ctx.fill();
            ctx.restore();
        }
    }

    function spawnMeteor() {
        meteors.push(new Meteor(width/2, (height+70)/2));
    }

    function drawGrid() {
        const w = width / 12;
        const h = (height - 70) / 12;
        ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

        for(let i=0; i<12; i++) {
            ctx.fillStyle = (hitBlocks.top === i) ? '#ff6600' : '#111';
            ctx.fillRect(w*i+1, 71, w-2, blockSize);
            ctx.fillStyle = (hitBlocks.bottom === i) ? '#ff6600' : '#111';
            ctx.fillRect(w*i+1, height-blockSize-1, w-2, blockSize);
            ctx.fillStyle = (hitBlocks.left === i) ? '#ff6600' : '#111';
            ctx.fillRect(1, 70+h*i+1, blockSize, h-2);
            ctx.fillStyle = (hitBlocks.right === i) ? '#ff6600' : '#111';
            ctx.fillRect(width-blockSize-1, 70+h*i+1, blockSize, h-2);

            ctx.fillStyle = '#444';
            ctx.fillText(notes[i], w*i+w/2, 70+blockSize/2);
            ctx.fillText(notes[i], w*i+w/2, height-blockSize/2);
            ctx.fillText(notes[i], blockSize/2, 70+h*i+h/2);
            ctx.fillText(notes[i], width-blockSize/2, 70+h*i+h/2);
        }
        for(let k in hitBlocks) hitBlocks[k] = -1;
    }

    let activeMeteor = null;
    let startT = {x:0, y:0};

    canvas.addEventListener('touchstart', e => {
        const tx = e.touches[0].clientX; const ty = e.touches[0].clientY;
        meteors.forEach(m => {
            if(Math.hypot(m.x - tx, m.y - ty) < 40) {
                activeMeteor = m; m.isDragging = true; startT = {x:tx, y:ty};
            }
        });
    });

    canvas.addEventListener('touchend', e => {
        if(activeMeteor) {
            activeMeteor.vx = (e.changedTouches[0].clientX - startT.x) * 0.15;
            activeMeteor.vy = (e.changedTouches[0].clientY - startT.y) * 0.15;
            activeMeteor.isDragging = false; activeMeteor = null;
        }
    });

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pauseBtn').innerText = isPaused ? 'RESUME' : 'PAUSE';
    }

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
    }

    function render() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);
        drawGrid();
        meteors.forEach(m => { m.update(); m.draw(); });
        requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
    resize(); spawnMeteor(); render();
</script>
</body>
</html>
