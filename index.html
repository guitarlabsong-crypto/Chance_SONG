<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleatoric Space V12 - SONG, YOUNG-MIN Guitar Lab</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        #header {
            position: absolute; top: 0; width: 100%; height: 75px;
            background: rgba(0,0,0,0.9); display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            border-bottom: 1px solid #1a1a1a;
        }
        #watermark { font-size: 10px; letter-spacing: 2px; color: #555; margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn {
            background: #001f3f; border: 1px solid #003366; color: #fff;
            padding: 6px 16px; border-radius: 20px; font-size: 11px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn:active { transform: scale(0.9); background: #003366; }
        .label { color: #444; font-size: 9px; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="header">
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>
    <div class="controls">
        <div id="spawnBtn" class="btn" onclick="handleSpawn()" style="border-color: #ffd700;">SPAWN (Au)</div>
        <div style="width:10px"></div>
        <span class="label">SPEED</span>
        <div class="btn" onclick="changeSpeed(-1)">-</div>
        <div class="btn" onclick="changeSpeed(1)">+</div>
        <div class="btn" onclick="togglePause()" id="pauseBtn">PAUSE</div>
    </div>
</div>

<canvas id="space"></canvas>

<script>
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88];
    
    let width, height, isPaused = false, tempoScale = 1.0;
    const blockSize = 32; 
    let meteors = [];
    let hitBlocks = { t: -1, b: -1, l: -1, r: -1, color: '#fff' };

    const elementTypes = [
        { symbol: 'Au', color: '#ffd700', mass: 2.5 },
        { symbol: 'Ag', color: '#e0e0e0', mass: 1.8 },
        { symbol: 'Fe', color: '#8b8b83', mass: 2.0 },
        { symbol: 'Cu', color: '#ff7f24', mass: 2.2 },
        { symbol: 'C',  color: '#444444', mass: 1.2 }
    ];
    let currentElemIdx = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const mainGain = audioCtx.createGain();
    mainGain.gain.value = 0.5;
    mainGain.connect(audioCtx.destination);

    function playScaledNote(index, radius) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freqs[index % 12], audioCtx.currentTime);
        
        // 볼륨 로직: 반지름에 정비례 (최대 22일 때 0.5, 최소 5일 때 0.1)
        const volume = (radius / 22) * 0.4;
        g.gain.setValueAtTime(volume, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);
        
        osc.connect(g);
        g.connect(mainGain);
        osc.start(); osc.stop(audioCtx.currentTime + 1.0);
    }

    class Meteor {
        constructor(x, y, config, radius = 22) {
            this.x = x; this.y = y;
            this.vx = 0; this.vy = 0;
            this.radius = radius;
            this.config = config;
            this.angle = Math.random() * Math.PI * 2;
            this.rotationSpeed = 0.02; // 초기 자전 속도
            this.history = [];
            this.isDragging = false;
            this.vertices = this.createRockShape();
        }

        createRockShape() {
            let v = [];
            for(let i=0; i<8; i++) {
                const a = (i/8)*Math.PI*2;
                const r = this.radius * (0.8 + Math.random()*0.4);
                v.push({x: Math.cos(a)*r, y: Math.sin(a)*r});
            }
            return v;
        }

        update() {
            if (isPaused || this.isDragging) return;
            
            if(Math.abs(this.vx) > 0 || Math.abs(this.vy) > 0) {
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > 8) this.history.shift();
            }

            this.x += this.vx * tempoScale;
            this.y += this.vy * tempoScale;
            this.angle += this.rotationSpeed * tempoScale;

            const limits = { t: 75+blockSize+this.radius, b: height-blockSize-this.radius, l: blockSize+this.radius, r: width-blockSize-this.radius };

            if (this.x < limits.l || this.x > limits.r) {
                this.vx *= -0.95;
                const idx = Math.floor(((this.y - 75) / (height - 75)) * 12);
                hitBlocks.color = this.config.color;
                if (this.x < limits.l) { this.x = limits.l; hitBlocks.l = idx; } else { this.x = limits.r; hitBlocks.r = idx; }
                playScaledNote(idx, this.radius);
            }
            if (this.y < limits.t || this.y > limits.b) {
                this.vy *= -0.95;
                const idx = Math.floor((this.x / width) * 12);
                hitBlocks.color = this.config.color;
                if (this.y < limits.t) { this.y = limits.t; hitBlocks.t = idx; } else { this.y = limits.b; hitBlocks.b = idx; }
                playScaledNote(idx, this.radius);
            }
        }

        draw() {
            this.history.forEach((pos, i) => {
                ctx.globalAlpha = (i / 8) * 0.2;
                ctx.fillStyle = this.config.color;
                ctx.beginPath(); ctx.arc(pos.x, pos.y, this.radius * (i/8), 0, Math.PI*2); ctx.fill();
            });
            ctx.save();
            ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            ctx.fillStyle = this.config.color; ctx.shadowBlur = 15; ctx.shadowColor = this.config.color;
            ctx.beginPath(); ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
            this.vertices.forEach(v => ctx.lineTo(v.x, v.y));
            ctx.closePath(); ctx.fill();
            ctx.restore(); ctx.globalAlpha = 1.0;
        }
    }

    function resolveCollisions() {
        let toRemove = []; let toAdd = [];
        for (let i = 0; i < meteors.length; i++) {
            for (let j = i + 1; j < meteors.length; j++) {
                let m1 = meteors[i], m2 = meteors[j];
                let dist = Math.hypot(m2.x - m1.x, m2.y - m1.y);
                if (dist < m1.radius + m2.radius) {
                    // 분열 조건 (어느 정도 크기가 있을 때 부드럽게 쪼개짐)
                    if (m1.radius > 7 && m2.radius > 7) {
                        toRemove.push(i, j);
                        // 쪼개질 때 크기 감소폭을 완만하게 (0.85배)
                        const splitM1a = new Meteor(m1.x-5, m1.y, m1.config, m1.radius * 0.85);
                        const splitM1b = new Meteor(m1.x+5, m1.y, m1.config, m1.radius * 0.85);
                        splitM1a.vx = -m1.vx * 0.5; splitM1a.vy = -m1.vy * 0.5;
                        splitM1b.vx = m1.vx * 0.8; splitM1b.vy = m1.vy * 0.8;
                        toAdd.push(splitM1a, splitM1b);
                    } else {
                        // 작을 때는 튕기기 (에너지 전달)
                        let nx = (m2.x - m1.x) / dist; let ny = (m2.y - m1.y) / dist;
                        let p = 2 * (m1.vx * nx + m1.vy * ny - m2.vx * nx - m2.vy * ny) / (m1.config.mass + m2.config.mass);
                        m1.vx -= p * m2.config.mass * nx; m1.vy -= p * m2.config.mass * ny;
                        m2.vx += p * m1.config.mass * nx; m2.vy += p * m1.config.mass * ny;
                    }
                }
            }
        }
        const uniqueRemove = [...new Set(toRemove)].sort((a, b) => b - a);
        uniqueRemove.forEach(idx => meteors.splice(idx, 1));
        toAdd.forEach(m => meteors.push(m));
    }

    function handleSpawn() {
        const config = elementTypes[currentElemIdx];
        meteors.push(new Meteor(width/2, (height+75)/2, config, 22));
        currentElemIdx = (currentElemIdx + 1) % elementTypes.length;
        const next = elementTypes[currentElemIdx];
        const btn = document.getElementById('spawnBtn');
        btn.innerText = `SPAWN (${next.symbol})`;
        btn.style.borderColor = next.color;
    }

    function drawGrid() {
        const w = width / 12, h = (height - 75) / 12;
        ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        for(let i=0; i<12; i++) {
            const drawBlock = (x, y, wi, hi, hit) => {
                ctx.fillStyle = hit ? hitBlocks.color : 'rgba(255,255,255,0.05)';
                ctx.beginPath(); ctx.roundRect(x, y, wi, hi, 15); ctx.fill();
            };
            drawBlock(w*i+3, 78, w-6, blockSize-6, hitBlocks.t === i);
            drawBlock(w*i+3, height-blockSize+3, w-6, blockSize-6, hitBlocks.b === i);
            drawBlock(3, 75+h*i+3, blockSize-6, h-6, hitBlocks.l === i);
            drawBlock(width-blockSize+3, 75+h*i+3, blockSize-6, h-6, hitBlocks.r === i);
            ctx.fillStyle = '#222';
            ctx.fillText(notes[i], w*i+w/2, 75+blockSize/2);
            ctx.fillText(notes[i], w*i+w/2, height-blockSize/2);
            ctx.fillText(notes[i], blockSize/2, 75+h*i+h/2);
            ctx.fillText(notes[i], width-blockSize/2, 75+h*i+h/2);
        }
        for(let k in hitBlocks) if(k !== 'color') hitBlocks[k] = -1;
    }

    let activeMeteor = null; let startT = {x:0, y:0};
    canvas.addEventListener('pointerdown', e => {
        const tx = e.clientX; const ty = e.clientY;
        meteors.forEach(m => {
            if(Math.hypot(m.x - tx, m.y - ty) < m.radius + 30) {
                activeMeteor = m; m.isDragging = true; startT = {x:tx, y:ty};
                m.vx = 0; m.vy = 0; m.rotationSpeed = 0.1;
            }
        });
    });
    canvas.addEventListener('pointermove', e => { if(activeMeteor && activeMeteor.isDragging) { activeMeteor.x = e.clientX; activeMeteor.y = e.clientY; } });
    canvas.addEventListener('pointerup', e => {
        if(activeMeteor) {
            activeMeteor.vx = (e.clientX - startT.x) * 0.15;
            activeMeteor.vy = (e.clientY - startT.y) * 0.15;
            activeMeteor.isDragging = false; activeMeteor = null;
        }
    });

    function changeSpeed(delta) { tempoScale = Math.max(0.1, Math.min(3.0, tempoScale + delta * 0.1)); }
    function togglePause() { isPaused = !isPaused; document.getElementById('pauseBtn').innerText = isPaused ? 'RESUME' : 'PAUSE'; }
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }

    function render() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);
        drawGrid();
        if(!isPaused) resolveCollisions();
        meteors.forEach(m => { m.update(); m.draw(); });
        requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
    resize(); 
    // 초기 운석 생성 (Au)
    meteors.push(new Meteor(window.innerWidth/2, (window.innerHeight+75)/2, elementTypes[0], 22));
    render();
</script>
</body>
</html>
